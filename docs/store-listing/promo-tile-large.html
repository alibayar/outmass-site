<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OutMass — Large Promo Tile 920×680</title>
<style>
  /* ───────────────────────────────────────────────────────────
     Chrome Web Store large promo tile — exactly 920×680 px.

     CAPTURE:
       F12 → right-click #tile → "Capture node screenshot" → PNG 920×680.
     ─────────────────────────────────────────────────────────── */

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f5f5f5;
    font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
    padding: 20px;
  }

  #tile {
    width: 920px;
    height: 680px;
    overflow: hidden;
    color: #fff;
    background: linear-gradient(135deg, #0078d4 0%, #4b2e8e 100%);
    position: relative;
  }
  #tile::before {
    content: "";
    position: absolute; inset: 0;
    background:
      radial-gradient(circle at 85% 15%, rgba(255,255,255,0.14) 0%, transparent 42%),
      radial-gradient(circle at 10% 95%, rgba(255,255,255,0.10) 0%, transparent 42%);
    pointer-events: none;
  }

  .inner {
    position: relative;
    z-index: 1;
    padding: 64px 72px;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  /* Top — logo + brand */
  .top {
    display: flex;
    align-items: center;
    gap: 22px;
  }
  .logo {
    width: 88px; height: 88px;
    background: #fff;
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 24px rgba(0,0,0,0.22);
    color: #0078d4;
    font-weight: 800;
    font-size: 34px;
    letter-spacing: -0.5px;
  }
  .logo img { width: 66px; height: 66px; }
  .brand {
    font-size: 58px;
    font-weight: 800;
    letter-spacing: -1px;
  }

  /* Middle — tagline + pitch */
  .middle {
    display: flex;
    flex-direction: column;
    gap: 18px;
  }
  .tagline {
    font-size: 52px;
    font-weight: 800;
    line-height: 1.15;
    letter-spacing: -1.2px;
  }
  .tagline em {
    font-style: normal;
    background: linear-gradient(90deg, #ffd966, #ffb347);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .pitch {
    font-size: 22px;
    font-weight: 500;
    line-height: 1.45;
    opacity: 0.9;
    max-width: 640px;
  }

  /* Bottom — feature pills */
  .features {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
  }
  .pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px;
    background: rgba(255,255,255,0.14);
    border: 1px solid rgba(255,255,255,0.22);
    border-radius: 999px;
    font-size: 15px;
    font-weight: 600;
    backdrop-filter: blur(4px);
  }
  .pill .dot {
    width: 7px; height: 7px;
    background: #50e3c2;
    border-radius: 50%;
  }
</style>
</head>
<body>
  <div id="tile">
    <div class="inner">
      <div class="top">
        <div class="logo">
          <span class="logo-text">OM</span>
          <img class="logo-img" src="../../extension/icons/icon128.png" alt=""
               onload="this.previousElementSibling.style.display='none'"
               onerror="this.remove()">
        </div>
        <div class="brand">OutMass</div>
      </div>

      <div class="middle">
        <div class="tagline">
          Mass email,<br><em>inside Outlook</em>
        </div>
        <div class="pitch">
          Turn any Outlook Web account into a cold-outreach machine.
          Mail merge, A/B subjects, auto follow-ups and AI-written
          copy — without leaving your inbox.
        </div>
      </div>

      <div class="features">
        <div class="pill"><div class="dot"></div>Mail merge with CSV</div>
        <div class="pill"><div class="dot"></div>AI email writer</div>
        <div class="pill"><div class="dot"></div>Open &amp; click tracking</div>
        <div class="pill"><div class="dot"></div>Auto follow-ups</div>
        <div class="pill"><div class="dot"></div>A/B subject tests</div>
      </div>
    </div>
  </div>
</body>
</html>
