name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    env:
      SUPABASE_URL: https://fake.supabase.co
      SUPABASE_KEY: fake-key-for-ci
      JWT_SECRET: ci-test-secret-not-for-production-use-only
      REDIS_URL: redis://localhost:6379/0
      BACKEND_URL: http://localhost:8000

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run unit tests
        run: python -m pytest tests/ -v --ignore=tests/integration

  extension-checks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # csv-decode (10 encoding fixtures vs the real decodeCsvBuffer),
      # locale-consistency (11 locales: key parity + placeholders),
      # i18n-usage (every literal t()/data-i18n key exists in en).
      # No npm deps — plain Node.
      - name: Run extension checks
        run: node extension/tests/run-all.js

  e2e-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Run E2E tests
        run: npx playwright test
